name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files (Excluding DBs)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          password: ${{ secrets.PI_PASSWORD }}
          source: "."
          target: "/home/pi/your-folder-name"
          # This prevents overwriting your local DBs if they exist in the repo
          rm: false 
          strip_components: 0
          # Note: scp-action is basic; for complex excludes, we'll 
          # ensure the SSH script below doesn't touch them.

      - name: Update Venv and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            cd /home/pi/your-folder-name
            
            # 1. Create venv if it doesn't exist
            python3 -m venv venv
            
            # 2. Update dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 3. Restart the script (targeting your specific path)
            # Kill the old process if running
            pkill -f "Main/main.py" || true
            
            # Run the new version in the background
            nohup venv/bin/python3 Main/main.py > log.txt 2>&1 &